# GogChat — Architectural Constraints
# Enforced by sentrux rules engine. Run: sentrux check .
# CI gate: prevents architectural regression.

[constraints]
max_cycles = 0          # Zero circular dependencies (currently perfect)
max_cc = 30             # Max cyclomatic complexity per function
no_god_files = true     # Flag files with excessive fan-out
max_depth = 11          # Prevent depth regression (current: 11)
min_modularity = 0.15   # Modularity floor (current: 0.177, headroom allowed)

# Layer definitions — defines the architectural hierarchy.
# Convention: importing layers must have LOWER order numbers than the layers they import from.
# Higher order = more foundational (depended upon by more layers).
# Example: app-entry (0) imports from shared (4) → 0 < 4 ✓
[[layers]]
name = "app-entry"
paths = ["src/main/index.ts", "src/main/windowWrapper.ts"]
order = 0

[[layers]]
name = "features"
paths = ["src/main/features/*"]
order = 1

[[layers]]
name = "initializers"
paths = ["src/main/initializers/*"]
order = 1.5

[[layers]]
name = "preload"
paths = ["src/preload/*"]
order = 2

[[layers]]
name = "utils"
paths = ["src/main/utils/*", "src/main/config.ts"]
order = 3

[[layers]]
name = "shared"
paths = ["src/shared/*"]
order = 4

# Boundary rules — prevent violations of architectural intent.

# Features must not import from other features.
# This rule is now clean: singleInstance uses menuActionRegistry,
# externalLinks imports directly from utils/bootstrapWatcher.
[[boundaries]]
from = "src/main/features/*"
to = "src/main/features/*"
reason = "Features must not import from other features directly — use shared/ contracts, utils/ services, or menuActionRegistry"

# Offline page must not import from main process (different build context).
[[boundaries]]
from = "src/offline/*"
to = "src/main/*"
reason = "Offline page has no preload/IPC — runs in sandboxed renderer context"

# Offline page must not import from preload (different build output).
[[boundaries]]
from = "src/offline/*"
to = "src/preload/*"
reason = "Offline page has no preload script — different build context"

# Shared layer must not depend on main process internals.
[[boundaries]]
from = "src/shared/*"
to = "src/main/*"
reason = "Shared contracts must be process-independent — no main process imports"

# Shared layer must not depend on preload.
[[boundaries]]
from = "src/shared/*"
to = "src/preload/*"
reason = "Shared contracts must be process-independent — no preload imports"

# Initializers may reference features for registration (static or dynamic import).
# This is their designated role — they orchestrate feature lifecycle.
[[boundaries]]
from = "src/main/initializers/*"
to = "src/main/features/*"
reason = "Initializers may statically import or dynamically import features for registration — this is their designated role"

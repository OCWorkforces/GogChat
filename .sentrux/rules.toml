# GogChat — Architectural Constraints
# Enforced by sentrux rules engine. Run: sentrux check .
# CI gate: prevents architectural regression.

# === Process Isolation (Electron sandbox boundaries) ===

[[rules]]
name = "main-no-preload"
description = "Main process must not import from preload (different build context, sandbox boundary)"
deny = ["src.main -> src.preload"]

[[rules]]
name = "main-no-offline"
description = "Main process must not import from offline (standalone fallback page, no IPC access)"
deny = ["src.main -> src.offline"]

[[rules]]
name = "preload-no-main"
description = "Preload (CJS sandbox) must not import from main process"
deny = ["src.preload -> src.main"]

[[rules]]
name = "preload-no-offline"
description = "Preload must not import from offline (different build output)"
deny = ["src.preload -> src.offline"]

[[rules]]
name = "shared-is-leaf"
description = "Shared contracts must be process-independent — pure dependency leaf with no runtime layer imports"
deny = [
  "src.shared -> src.main",
  "src.shared -> src.preload",
  "src.shared -> src.offline",
]

[[rules]]
name = "offline-isolated"
description = "Offline page is standalone IIFE — zero imports, no IPC, separate build context"
deny = [
  "src.offline -> src.main",
  "src.offline -> src.preload",
  "src.offline -> src.shared",
]

# === Main Process Internal Layering ===

[[rules]]
name = "utils-no-feature-imports"
description = "Utility modules are dependency leaves — they must not import from feature modules"
deny = ["src.main.utils -> src.main.features"]

[[rules]]
name = "utils-no-initializer-imports"
description = "Utility modules must not import from initializers (initializers orchestrate utils, not vice versa)"
deny = ["src.main.utils -> src.main.initializers"]

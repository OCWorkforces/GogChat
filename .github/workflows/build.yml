name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter (TypeScript)
        run: npm run ts

      - name: Run unit tests
        run: npm run test:run

      - name: Run security audit
        run: npm audit --production --audit-level=moderate
        continue-on-error: true

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Make build scripts executable
        run: |
          chmod +x build-macOS-x64-dmg.sh
          chmod +x build-macOS-arm64-dmg.sh

      - name: Build macOS x64 DMG
        run: ./build-macOS-x64-dmg.sh --environment ${{ github.ref_name }}

      - name: Preserve x64 artifacts
        run: |
          mkdir -p artifacts/x64
          mv dist/*x64*.dmg artifacts/x64/ || true
          mv dist/*x64*.sha256 artifacts/x64/ || true

      - name: Build macOS ARM64 DMG
        run: ./build-macOS-arm64-dmg.sh --environment ${{ github.ref_name }}

      - name: Preserve ARM64 artifacts
        run: |
          mkdir -p artifacts/arm64
          mv dist/*arm64*.dmg artifacts/arm64/ || true
          mv dist/*arm64*.sha256 artifacts/arm64/ || true

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: gchat-macos-x64-dmg
          path: artifacts/x64/*
          retention-days: 30

      - name: Upload macOS ARM64 artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: gchat-macos-arm64-dmg
          path: artifacts/arm64/*
          retention-days: 30

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-macos]
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "Build Summary:"
          echo "- macOS: ${{ needs.build-macos.result }}"

          if [ "${{ needs.build-macos.result }}" != "success" ]; then
            echo "❌ macOS build failed"
            exit 1
          else
            echo "✅ All builds succeeded"
          fi

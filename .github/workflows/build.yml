name: Build & Test

on:
  push:
    branches: [ main, develop, init-feature ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter (TypeScript)
        run: npm run ts

      - name: Run unit tests
        run: npm run test:run

      - name: Run security audit
        run: npm audit --production --audit-level=moderate
        continue-on-error: true

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run ts

      - name: Package macOS app (Intel)
        if: matrix.arch == 'x64'
        run: npm run pack:mac

      - name: Package macOS app (ARM)
        if: matrix.arch == 'arm64'
        run: npm run pack:mac-arm

      - name: Build macOS ZIP (Intel)
        if: matrix.arch == 'x64'
        run: npm run build:mac-zip

      - name: Build macOS ZIP (ARM)
        if: matrix.arch == 'arm64'
        run: npm run build:mac-arm-zip

      - name: Upload macOS artifacts (Intel)
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: gchat-macos-x64
          path: dist/installers/*.zip
          retention-days: 30

      - name: Upload macOS artifacts (ARM)
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: gchat-macos-arm64
          path: dist/installers/*.zip
          retention-days: 30

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-macos]
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "Build Summary:"
          echo "- macOS: ${{ needs.build-macos.result }}"

          if [ "${{ needs.build-macos.result }}" != "success" ]; then
            echo "❌ macOS build failed"
            exit 1
          else
            echo "✅ All builds succeeded"
          fi

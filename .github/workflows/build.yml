name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter (TypeScript)
        run: npm run ts

      - name: Run unit tests
        run: npm run test:run

      - name: Run security audit
        run: npm audit --production --audit-level=moderate
        continue-on-error: true

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-latest
    needs: test
    strategy:
      matrix:
        arch: [x64, arm64]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Make build script executable
        run: chmod +x build-macOS-${{ matrix.arch }}-dmg.sh

      - name: Build macOS ${{ matrix.arch }} DMG
        run: ./build-macOS-${{ matrix.arch }}-dmg.sh --environment ${{ github.head_ref || github.ref_name }}

      - name: Preserve ${{ matrix.arch }} artifacts
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        run: |
          mkdir -p artifacts/${{ matrix.arch }}
          mv dist/*${{ matrix.arch }}*.dmg artifacts/${{ matrix.arch }}/ || true
          mv dist/*${{ matrix.arch }}*.sha256 artifacts/${{ matrix.arch }}/ || true

      - name: Upload macOS ${{ matrix.arch }} artifacts
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: actions/upload-artifact@v4.6.2
        with:
          name: gchat-macos-${{ matrix.arch }}-dmg
          path: artifacts/${{ matrix.arch }}/*
          retention-days: 30

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-macos]
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "Build Summary:"
          echo "- macOS: ${{ needs.build-macos.result }}"

          if [ "${{ needs.build-macos.result }}" != "success" ]; then
            echo "❌ macOS build failed"
            exit 1
          else
            echo "✅ All builds succeeded"
          fi

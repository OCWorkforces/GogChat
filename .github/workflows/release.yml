name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v3.0.6)'
        required: true
        type: string

env:
  NODE_VERSION: '22.x'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Read CHANGELOG
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract the latest version's changelog
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            awk '/^## \[/{if(p)exit;p=1;next} p' CHANGELOG.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changelog=No changelog available" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## GChat ${{ steps.get_version.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ### Downloads
            - **Windows**: GChat-Setup-${{ steps.get_version.outputs.version }}.exe
            - **macOS Intel**: GChat-${{ steps.get_version.outputs.version }}-mac-x64.zip
            - **macOS ARM**: GChat-${{ steps.get_version.outputs.version }}-mac-arm64.zip
            - **Linux**: GChat-${{ steps.get_version.outputs.version }}-amd64.deb

            ### Security
            - All packages are signed and verified
            - SHA512 checksums provided for Linux packages
            - See [SECURITY.md](https://github.com/${{ github.repository }}/blob/main/SECURITY.md) for security details

            ---
            🤖 Generated with [Claude Code](https://claude.com/claude-code)
          draft: false
          prerelease: false

  build-and-upload-windows:
    name: Build & Upload Windows
    runs-on: windows-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript
        run: npm run ts

      - name: Run tests
        run: npm run test:run

      - name: Package Windows app
        run: npm run pack:windows

      - name: Build Windows installer
        run: npm run build:windows

      - name: Get installer filename
        id: get_filename
        shell: bash
        run: |
          INSTALLER=$(ls dist/installers/*.exe | head -n 1)
          echo "filename=${INSTALLER##*/}" >> $GITHUB_OUTPUT
          echo "filepath=$INSTALLER" >> $GITHUB_OUTPUT

      - name: Upload Windows installer
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.get_filename.outputs.filepath }}
          asset_name: ${{ steps.get_filename.outputs.filename }}
          asset_content_type: application/octet-stream

  build-and-upload-macos:
    name: Build & Upload macOS
    runs-on: macos-latest
    needs: create-release
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript
        run: npm run ts

      - name: Run tests
        run: npm run test:run

      - name: Package macOS app (Intel)
        if: matrix.arch == 'x64'
        run: npm run pack:mac

      - name: Package macOS app (ARM)
        if: matrix.arch == 'arm64'
        run: npm run pack:mac-arm

      - name: Build macOS ZIP (Intel)
        if: matrix.arch == 'x64'
        run: npm run build:mac-zip

      - name: Build macOS ZIP (ARM)
        if: matrix.arch == 'arm64'
        run: npm run build:mac-arm-zip

      - name: Get installer filename
        id: get_filename
        run: |
          INSTALLER=$(ls dist/installers/*.zip | head -n 1)
          echo "filename=${INSTALLER##*/}" >> $GITHUB_OUTPUT
          echo "filepath=$INSTALLER" >> $GITHUB_OUTPUT

      - name: Upload macOS installer
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.get_filename.outputs.filepath }}
          asset_name: ${{ steps.get_filename.outputs.filename }}
          asset_content_type: application/zip

  build-and-upload-linux:
    name: Build & Upload Linux
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript
        run: npm run ts

      - name: Run tests
        run: npm run test:run

      - name: Package Linux app
        run: npm run pack:linux

      - name: Build Debian package
        run: npm run build:deb

      - name: Generate checksums
        run: npm run build:deb-checksum

      - name: Get installer filename
        id: get_filename
        run: |
          DEB=$(ls dist/installers/*.deb | head -n 1)
          CHECKSUM=$(ls dist/installers/*-SHA512.txt | head -n 1)
          echo "deb_filename=${DEB##*/}" >> $GITHUB_OUTPUT
          echo "deb_filepath=$DEB" >> $GITHUB_OUTPUT
          echo "checksum_filename=${CHECKSUM##*/}" >> $GITHUB_OUTPUT
          echo "checksum_filepath=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Upload Debian package
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.get_filename.outputs.deb_filepath }}
          asset_name: ${{ steps.get_filename.outputs.deb_filename }}
          asset_content_type: application/vnd.debian.binary-package

      - name: Upload checksums
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.get_filename.outputs.checksum_filepath }}
          asset_name: ${{ steps.get_filename.outputs.checksum_filename }}
          asset_content_type: text/plain

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [build-and-upload-windows, build-and-upload-macos, build-and-upload-linux]
    if: always()

    steps:
      - name: Check release status
        run: |
          echo "Release Summary for ${{ needs.create-release.outputs.version }}:"
          echo "- Windows: ${{ needs.build-and-upload-windows.result }}"
          echo "- macOS: ${{ needs.build-and-upload-macos.result }}"
          echo "- Linux: ${{ needs.build-and-upload-linux.result }}"

          if [ "${{ needs.build-and-upload-windows.result }}" != "success" ] || \
             [ "${{ needs.build-and-upload-macos.result }}" != "success" ] || \
             [ "${{ needs.build-and-upload-linux.result }}" != "success" ]; then
            echo "❌ One or more release builds failed"
            exit 1
          else
            echo "✅ All release builds succeeded"
            echo "🎉 Release ${{ needs.create-release.outputs.version }} published successfully!"
          fi

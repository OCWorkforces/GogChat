name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v3.0.6)'
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '22.x'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Read CHANGELOG
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract the latest version's changelog
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            awk '/^## \[/{if(p)exit;p=1;next} p' CHANGELOG.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changelog=No changelog available" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          CHANGELOG="${{ steps.changelog.outputs.changelog }}"

          # Create release body
          cat > release_body.md <<'EOF'
          ## GChat ${{ steps.get_version.outputs.version }}

          ${{ steps.changelog.outputs.changelog }}

          ### Downloads
          - **macOS Intel (x64)**: Google-Chat-v${{ steps.get_version.outputs.version }}-macOS-x64-main.dmg
          - **macOS ARM (Apple Silicon)**: Google-Chat-v${{ steps.get_version.outputs.version }}-macOS-arm64-main.dmg

          ### Security
          - See [SECURITY.md](https://github.com/${{ github.repository }}/blob/main/SECURITY.md) for security details

          ---
          🤖 Generated with [Claude Code](https://claude.com/claude-code)
          EOF

          # Create release using GitHub CLI
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes-file release_body.md

  download-and-upload-artifacts:
    name: Download & Upload Artifacts
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Download x64 artifacts from build workflow
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: build.yml
          name: gchat-macos-x64-dmg
          path: ./artifacts/x64
          branch: main
          event: push

      - name: Download ARM64 artifacts from build workflow
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: build.yml
          name: gchat-macos-arm64-dmg
          path: ./artifacts/arm64
          branch: main
          event: push

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"

          # Upload all DMG and checksum files to the release
          gh release upload "$VERSION" \
            ./artifacts/x64/*.dmg \
            ./artifacts/x64/*.sha256 \
            ./artifacts/arm64/*.dmg \
            ./artifacts/arm64/*.sha256

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [create-release, download-and-upload-artifacts]
    if: always()

    steps:
      - name: Check release status
        run: |
          echo "Release Summary for ${{ needs.create-release.outputs.version }}:"
          echo "- Artifact Upload: ${{ needs.download-and-upload-artifacts.result }}"

          if [ "${{ needs.download-and-upload-artifacts.result }}" != "success" ]; then
            echo "❌ Release artifact upload failed"
            exit 1
          else
            echo "✅ Release created successfully"
            echo "🎉 Release ${{ needs.create-release.outputs.version }} published successfully!"
          fi

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v3.0.6)'
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '22.x'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Read CHANGELOG
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract the latest version's changelog
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            awk '/^## \[/{if(p)exit;p=1;next} p' CHANGELOG.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changelog=No changelog available" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          CHANGELOG="${{ steps.changelog.outputs.changelog }}"

          # Create release body
          cat > release_body.md <<'EOF'
          ## GChat ${{ steps.get_version.outputs.version }}

          ${{ steps.changelog.outputs.changelog }}

          ### Downloads
          - **macOS Intel (x64)**: Google-Chat-v${{ steps.get_version.outputs.version }}-macOS-x64-main.dmg
          - **macOS ARM (Apple Silicon)**: Google-Chat-v${{ steps.get_version.outputs.version }}-macOS-arm64-main.dmg

          ### Security
          - See [SECURITY.md](https://github.com/${{ github.repository }}/blob/main/SECURITY.md) for security details

          ---
          🤖 Generated with [Claude Code](https://claude.com/claude-code)
          EOF

          # Create release using GitHub CLI
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes-file release_body.md

  build-and-upload-macos:
    name: Build & Upload macOS
    runs-on: macos-latest
    needs: create-release
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test:run

      - name: Make build scripts executable
        run: |
          chmod +x build-macOS-x64-dmg.sh
          chmod +x build-macOS-arm64-dmg.sh

      - name: Build macOS x64 DMG
        if: matrix.arch == 'x64'
        run: ./build-macOS-x64-dmg.sh --environment main

      - name: Build macOS ARM64 DMG
        if: matrix.arch == 'arm64'
        run: ./build-macOS-arm64-dmg.sh --environment main

      - name: Upload DMG and checksum to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"

          # Find DMG and checksum files
          DMG_FILE=$(ls dist/*.dmg)
          SHA_FILE=$(ls dist/*.sha256)

          # Upload to release
          gh release upload "$VERSION" "$DMG_FILE" "$SHA_FILE"

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [create-release, build-and-upload-macos]
    if: always()

    steps:
      - name: Check release status
        run: |
          echo "Release Summary for ${{ needs.create-release.outputs.version }}:"
          echo "- macOS: ${{ needs.build-and-upload-macos.result }}"

          if [ "${{ needs.build-and-upload-macos.result }}" != "success" ]; then
            echo "❌ macOS release build failed"
            exit 1
          else
            echo "✅ All release builds succeeded"
            echo "🎉 Release ${{ needs.create-release.outputs.version }} published successfully!"
          fi

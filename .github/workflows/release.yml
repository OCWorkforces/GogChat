name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'

      - run: bun install --frozen-lockfile

      - run: bun run build:prod

      - name: Create tag from package.json version
        id: create-tag
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          if git ls-remote --exit-code origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$VERSION"
            git push origin "$VERSION"
            echo "tag_name=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Build and package
        if: startsWith(github.ref, 'refs/tags/') || steps.create-tag.outputs.tag_name != ''
        run: bun run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

      - name: Verify build artifacts
        if: always() && (startsWith(github.ref, 'refs/tags/') || steps.create-tag.outputs.tag_name != '')
        run: 'ls -la dist/*.dmg 2>/dev/null || echo "WARNING: No DMG files found in dist/"'

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/') || steps.create-tag.outputs.tag_name != ''
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: dist/*.dmg
          tag_name: ${{ steps.create-tag.outputs.tag_name || github.ref_name }}
          fail_on_unmatched_files: true
          make_latest: true

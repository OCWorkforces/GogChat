name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
      should_release: ${{ steps.release.outputs.should_release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: release
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
            echo "should_release=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          VERSION="v$(node -p "require('./package.json').version")"
          echo "tag_name=${VERSION}" >> "${GITHUB_OUTPUT}"

          if git ls-remote --exit-code origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists, skipping release build"
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}"
          git push origin "$VERSION"
          echo "should_release=true" >> "${GITHUB_OUTPUT}"

  build-mac:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    permissions:
      contents: read
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'

      - run: bun install --frozen-lockfile

      - run: bun run build:prod

      - name: Build macOS DMG
        run: bun run package:mac:release
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

      - name: Verify macOS artifact trust
        run: bun scripts/verify-mac-release-signing.js --dist dist

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            processor_architecture: AMD64
          - arch: arm64
            runner: windows-11-arm
            processor_architecture: ARM64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'

      - run: bun install --frozen-lockfile

      - name: Verify Windows signing policy
        run: bun run package:win:signing-policy
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WINDOWS_ALLOW_UNSIGNED_RELEASE: ${{ vars.WINDOWS_ALLOW_UNSIGNED_RELEASE }}

      - name: Verify Windows runner architecture
        shell: pwsh
        run: |
          $actualArchitecture = $env:PROCESSOR_ARCHITECTURE
          $expectedArchitecture = '${{ matrix.processor_architecture }}'
          if ($actualArchitecture -ne $expectedArchitecture) {
            Write-Error "Expected Windows runner architecture $expectedArchitecture for ${{ matrix.arch }}, got $actualArchitecture"
            exit 1
          }
          Write-Host "Windows runner architecture matches $expectedArchitecture for ${{ matrix.arch }}"

      - name: Build Windows ${{ matrix.arch }} setup
        run: bun run package:win:${{ matrix.arch }}
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Verify Windows Authenticode signature
        if: vars.WINDOWS_ALLOW_UNSIGNED_RELEASE != 'true'
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path dist -Filter "*windows-${{ matrix.arch }}-setup.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Error "No Windows ${{ matrix.arch }} setup installer found for signature verification"
            exit 1
          }
          $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
          if ($signature.Status -ne 'Valid') {
            Write-Error "Windows ${{ matrix.arch }} installer signature is $($signature.Status): $($signature.StatusMessage)"
            exit 1
          }
          Write-Host "Windows ${{ matrix.arch }} installer Authenticode signature is valid"

      - name: Verify Windows ${{ matrix.arch }} artifact
        run: bun scripts/verify-windows-package-artifacts.js --dist dist --manifest --require-arch ${{ matrix.arch }}

      - name: Upload Windows ${{ matrix.arch }} artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-windows-${{ matrix.arch }}
          path: dist/*windows-${{ matrix.arch }}-setup.exe
          if-no-files-found: error

  verify-release-artifacts:
    needs: [prepare-release, build-mac, build-windows]
    if: needs.prepare-release.outputs.should_release == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'

      - run: bun install --frozen-lockfile

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Verify Windows signing policy before publish
        run: bun run package:win:signing-policy
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WINDOWS_ALLOW_UNSIGNED_RELEASE: ${{ vars.WINDOWS_ALLOW_UNSIGNED_RELEASE }}

      - name: Verify aggregated release artifacts
        run: bun scripts/verify-release-artifacts.js --input release-artifacts --output verified-release-assets

      - name: Upload verified release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verified-release-assets
          path: verified-release-assets/*
          if-no-files-found: error

  publish-release:
    needs: [prepare-release, verify-release-artifacts]
    if: needs.prepare-release.outputs.should_release == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verified-release-assets
          path: verified-release-assets

      - name: Upload release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: verified-release-assets/*
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          fail_on_unmatched_files: true
          make_latest: true

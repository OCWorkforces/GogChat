name: PR Check

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck & Test
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Electron binary
        run: node node_modules/electron/install.js

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Test with coverage
        run: bun run test:coverage 2>&1 | tee coverage-output.txt

      - name: 'Architecture: Circular deps'
        run: bunx madge --circular --extensions ts src/

      - name: 'Performance: Build production bundle'
        run: bun run build:prod

      - name: 'Performance: Headless startup capture'
        run: node scripts/headless-startup.js
        env:
          HEADLESS_TIMEOUT_MS: '60000'
          GOGCHAT_AUTO_QUIT_AFTER_MS: '12000'
          GOGCHAT_PERF_RUNS: '5'

      - name: 'Performance: Budget gate'
        run: node scripts/check-perf-budget.js performance-metrics.json

      - name: 'Performance: Upload metrics artifact'
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-metrics
          path: |
            performance-metrics.json
            .perf-history.json
          if-no-files-found: ignore
          retention-days: 14

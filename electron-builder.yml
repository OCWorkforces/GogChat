# Electron Builder Configuration
# https://www.electron.build/configuration/configuration

appId: com.ocworkforces.gogchat
productName: GogChat
copyright: Copyright © 2026 OCWorkforces

# Protocol handler for deep linking
protocols:
  name: 'GogChat'
  schemes:
    - gogchat
    - https

# Directories
directories:
  output: dist
  buildResources: resources

# Files to include/exclude in the app
files:
  - lib/**/*
  - node_modules/**/*
  - package.json
  - '!**/*.map'
  - '!**/*.test.{ts,js}'
  - '!**/*.spec.{ts,js}'
  - '!src/**/*'
  - '!.github/**/*'
  - '!coverage/**/*'
  - '!debian/**/*'
  - '!mac/**/*'
  - '!windows/**/*'
  - '!.git/**/*'
  - '!.vscode/**/*'
  - '!.idea/**/*'
  - '!tests/**/*'
  - '!scripts/**/*'
  - '!**/*.md'
  - '!tsconfig.json'
  - '!vitest.config.ts'
  - '!playwright.config.ts'
  - '!eslint.config.js'
  - '!.prettierrc.json'
  - '!.editorconfig'
  - '!.npmrc'
  - '!.gitignore'
  - '!.gitattributes'
  - '!.DS_Store'
  - '!package-lock.json'
  - '!bun.lock'
  - '!bunfig.toml'
  - '!bun.lock'
  - '!bunfig.toml'
  - '!entitlements.mac.*.plist'
  - '!electron-builder*.yml'
  - '!rsbuild.config.ts'
  - '!build-macOS-*.sh'

# Compression settings
compression: maximum
asar: true

# Locale optimization - keep only English (backup to after-pack.cjs)
electronLanguages:
  - en-US
  - en
afterPack: scripts/after-pack.cjs
afterSign: scripts/notarize.cjs

# macOS Configuration
mac:
  category: public.app-category.social-networking
  icon: resources/icons/normal/mac.icns
  minimumSystemVersion: "11.0"
  target:
    - target: dmg
  gatekeeperAssess: false

# DMG Configuration
dmg:
  title: '${productName} ${version}'
  icon: resources/icons/normal/mac.icns
  iconSize: 100
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 180
      type: file
    - x: 400
      y: 180
      type: link
      path: /Applications
  # Optional: Custom background
  # background: resources/dmg-background.png
  format: ULFO
  shrink: true

# Auto-update: configure a real provider here when ready.
# Example: provider: github (uses GitHub Releases)
# publish:
#   provider: github
#   owner: OCWorkforces
#   repo: GogChat

# Additional metadata
artifactName: '${productName}-v${version}-macOS-${arch}-${env.BUILD_ENV}.${ext}'
